[server]
host = "0.0.0.0"
port = 5000
enable_clipboard_sync = true
enable_screen_sharing = false
max_connections = 1

[client]
server_host = "127.0.0.1"
server_port = 5000
auto_connect = false

[security]
use_tls = false
certificate_path = "certs/server.crt"
key_path = "certs/server.key"

[logging]
level = "info"
format = "json"
