name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 🚀 ScreenLink Release ${{ github.ref_name }}
            
            ### 📝 Changes
            See [CHANGELOG.md](../../blob/${{ github.ref_name }}/CHANGELOG.md) for details.
            
            ### 📦 Downloads
            Binary packages available below.
            
            ### 🔧 Installation
            Extract the binary for your platform and run it. No installation required!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
