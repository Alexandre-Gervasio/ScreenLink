name: Build Portable Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            
          - os: windows-latest
            target: windows
            
          - os: macos-latest
            target: macos

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      # macOS setup
      - name: Setup macOS
        if: matrix.os == 'macos-latest'
        run: |
          export PATH="/usr/local/opt/ruby/bin:$PATH"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --verbose 2>&1 | tail -50

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Tauri app
        run: npm run app:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Portable Version (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: bash make-portable.sh

      - name: Fix Linux Permissions
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Ensure AppImage has execute permission
          chmod +x frontend/target/release/bundle/appimage/*.AppImage 2>/dev/null || true
          # Ensure shell scripts in portable have execute permission
          chmod +x dist-portable/*/run.sh 2>/dev/null || true
          chmod +x dist-portable/*.AppImage 2>/dev/null || true

      - name: Create Portable Version (Windows)
        if: matrix.os == 'windows-latest'
        run: powershell -File make-portable.ps1

      - name: Create Portable Version (macOS)
        if: matrix.os == 'macos-latest'
        run: bash make-portable.sh

      - name: Upload artifacts to Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            frontend/target/release/bundle/appimage/*.AppImage
            dist-portable/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            frontend/target/release/bundle/msi/*.msi
            dist-portable/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to Release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            frontend/target/release/bundle/dmg/*.dmg
            dist-portable/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
