name: Build Portable Executables

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: target/release/bundle/appimage/*.AppImage
            
          - os: windows-latest
            target: windows
            artifact: target/release/bundle/msi/*.msi
            
          - os: macos-latest
            target: macos
            artifact: target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      # macOS setup
      - name: Setup macOS
        if: matrix.os == 'macos-latest'
        run: |
          export PATH="/usr/local/opt/ruby/bin:$PATH"

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Tauri app
        run: npm run tauri build -- --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload to Release  
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create Release
    needs: build-tauri
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Release Summary
        run: |
          echo "✅ ScreenLink v${{ steps.version.outputs.version }} - Portable Executables Built"
          echo ""
          echo "📦 Downloads Available:"
          echo "  - ScreenLink-${{ steps.version.outputs.version }}.exe (Windows)"
          echo "  - ScreenLink-${{ steps.version.outputs.version }}.AppImage (Linux)"
          echo "  - ScreenLink-${{ steps.version.outputs.version }}.dmg (macOS)"
