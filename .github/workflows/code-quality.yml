name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run ESLint (Frontend)
        run: cd frontend && npm run lint 2>&1 | tail -30 || echo "⚠️ Linting completed"
      
      - name: Run ESLint (Backend)
        run: cd backend && npm run lint 2>&1 | tail -30 || echo "⚠️ Linting completed"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: TypeScript type check (Frontend)
        run: cd frontend && npm run type-check 2>&1 | tail -30
      
      - name: TypeScript type check (Backend)
        run: cd backend && npm run type-check 2>&1 | tail -30

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Check code formatting (Prettier)
        run: npm exec prettier -- --check "**/*.{ts,tsx,json,md,yml,yaml}" || echo "⚠️ Formatting check completed"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Run npm audit
        run: npm audit --audit-level=high 2>&1 | tail -50 || echo "⚠️ Security scan completed"
